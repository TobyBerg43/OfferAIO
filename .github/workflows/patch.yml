name: Patch dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node patch_dashboard.js
      - run: |
          git config user.name "offeraio-bot"
          git config user.email "bot@offeraio.dev"
          git add OfferAIO.html
          git diff --cached --quiet || git commit -m "dashboard: Active/Submitted task views [skip ci]"
          git push
