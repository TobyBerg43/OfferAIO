<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#fbf8f2;--panel:#f4eee2;--border:#e0d7c5;--border2:#d7cbb4;--txt:#2b2823;--dim:#726a5c;--dim2:#a89d89;--blue1:#33528c;--blue2:#4a72b8;--gold1:#c8862f;--gold2:#e0a548;--green:#2e9d68}
  *{box-sizing:border-box}
  body{width:330px;margin:0;background:var(--bg);color:var(--txt);font:13px/1.4 -apple-system,'Segoe UI',sans-serif;padding:14px}
  .head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--blue1),var(--blue2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .head b{font-size:15px}.head b span{background:linear-gradient(135deg,var(--blue1),var(--blue2));-webkit-background-clip:text;background-clip:text;color:transparent}
  label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:9px 0 4px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:8px;color:var(--txt);padding:7px 9px;font-size:12.5px;outline:none;font-family:inherit}
  input:focus,textarea:focus,select:focus{border-color:var(--blue1);box-shadow:0 0 0 3px rgba(51,82,140,.12)}
  textarea{resize:vertical;min-height:48px}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .seg{display:flex;background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:3px;gap:3px;margin-top:4px}
  .seg button{flex:1;border:none;background:transparent;color:var(--dim);padding:6px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer}
  .seg button.on{background:linear-gradient(135deg,var(--blue1),var(--blue2));color:#fff}
  .fillnow{width:100%;margin-top:10px;border:none;border-radius:9px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;background:linear-gradient(135deg,var(--gold1),var(--gold2));color:#3a2a10;box-shadow:0 4px 14px rgba(200,134,47,.3)}
  .save{width:100%;margin-top:8px;border:none;border-radius:9px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;background:linear-gradient(135deg,var(--blue1),var(--blue2));color:#fff}
  .note{font-size:10.5px;color:var(--dim2);margin-top:8px;text-align:center;line-height:1.5}
  .note a{color:var(--blue1);text-decoration:none;font-weight:600}
  .ok{color:var(--green);font-size:11.5px;text-align:center;margin-top:8px;opacity:0;transition:.3s}
  .ok.show{opacity:1}
  details summary{cursor:pointer;color:var(--dim);font-size:11px;font-weight:600;margin-top:10px;list-style:none}
  details summary::-webkit-details-marker{display:none}
</style>
</head>
<body>
  <div class="head"><div class="logo">O</div><b>Offer<span>AIO</span></b></div>

  <label>Apply mode</label>
  <div class="seg" id="modeSeg">
    <button data-v="semi" class="on">Semi-auto</button>
    <button data-v="auto">Full-auto</button>
  </div>

  <button class="fillnow" id="fillPage">⚡ Fill this application</button>
  <div class="note">Works on Greenhouse, Lever, Ashby, Workday, SmartRecruiters, iCIMS, Workable, Handshake, LinkedIn, ZipRecruiter, Indeed &amp; more — plus any employer link (click above on the application page).</div>

  <details>
    <summary>Edit my profile ▾</summary>
    <div class="row"><div><label>Full name</label><input id="name" placeholder="Toby B."></div></div>
    <div class="row">
      <div><label>Email</label><input id="email" type="email" placeholder="you@school.edu"></div>
      <div><label>Phone</label><input id="phone" placeholder="555-555-5555"></div>
    </div>
    <div class="row">
      <div><label>School</label><input id="school" placeholder="University"></div>
      <div><label>Grad date</label><input id="gradDate" placeholder="May 2028"></div>
    </div>
    <div class="row">
      <div><label>Major</label><input id="major" placeholder="Finance / CS"></div>
      <div><label>Minor</label><input id="minor" placeholder="optional"></div>
    </div>
    <div class="row">
      <div><label>GPA</label><input id="gpa" placeholder="3.8"></div>
      <div><label>Sponsorship?</label><select id="needsSponsorship"><option value="false">No</option><option value="true">Yes</option></select></div>
    </div>
    <label>LinkedIn</label><input id="linkedin" placeholder="linkedin.com/in/you">
    <label>Cover letter template</label>
    <textarea id="coverLetter" placeholder="Hi {company} team, I am applying for {role}..."></textarea>
    <button class="save" id="save">Save profile</button>
    <div class="ok" id="ok">Saved</div>
  </details>

  <div class="note"><a href="https://tobyberg43.github.io/OfferAIO/" target="_blank">Open OfferAIO dashboard</a></div>

<script>
  const F = ["name","email","phone","school","major","minor","gradDate","gpa","linkedin","needsSponsorship","coverLetter"];
  const seg = document.getElementById("modeSeg");
  seg.querySelectorAll("button").forEach(b => b.onclick = () => {
    seg.querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    chrome.storage.local.set({ mode: b.dataset.v });
  });
  chrome.storage.local.get(["profile","mode"], d => {
    const p = d.profile || {};
    F.forEach(k => { if (p[k] != null) document.getElementById(k).value = p[k]; });
    const mode = d.mode || "semi";
    seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.v === mode));
  });
  document.getElementById("save").onclick = () => {
    const profile = {};
    F.forEach(k => profile[k] = document.getElementById(k).value.trim());
    profile.needsSponsorship = document.getElementById("needsSponsorship").value === "true";
    const mode = seg.querySelector("button.on").dataset.v;
    chrome.storage.local.set({ profile, mode }, () => {
      const ok = document.getElementById("ok"); ok.classList.add("show");
      setTimeout(() => ok.classList.remove("show"), 2500);
    });
  };
  document.getElementById("fillPage").onclick = async () => {
    const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
    try { await chrome.scripting.executeScript({ target: { tabId: tab.id }, files: ["content.js"] }); } catch (e) {}
    window.close();
  };
</script>
</body>
</html>
